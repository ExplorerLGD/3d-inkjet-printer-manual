site_name: 3D Inkjet Printer Documentation
site_description: 3D inkjet printer product manual
site_url: https://explorerlgd.github.io/3d-inkjet-printer-manual/en/
repo_name: 3d-inkjet-printer-manual
docs_dir: docs/en
site_dir: site/en

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - navigation.top
    - toc.follow
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan

nav:
  - Overview: index.md
  - Installation and Configuration:
      - SD Card: installation/sd-card.md
      - Power Requirements: installation/power-requirements.md
      - Klipper Notes: installation/klipper-notes.md

extra:
  current_language: en
  alternate:
    - name: "\u4e2d\u6587"
      lang: zh
    - name: English
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
