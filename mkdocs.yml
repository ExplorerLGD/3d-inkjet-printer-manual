site_name: 3D Inkjet Printer Documentation
site_description: 3D inkjet printer product manual
site_url: https://explorerlgd.github.io/3d-inkjet-printer-manual/
repo_name: 3d-inkjet-printer-manual

theme:
  name: material
  custom_dir: overrides
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan

nav:
  - "\u6982\u8ff0": index.md
  - English:
      - Overview: en/index.md

extra:
  alternate:
    - name: "\u4e2d\u6587"
      link: ./
      lang: zh
    - name: English
      link: en/
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
