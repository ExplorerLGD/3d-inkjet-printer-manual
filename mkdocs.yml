site_name: 3D Inkjet Printer Documentation
site_description: 3D inkjet printer product manual
site_url: https://explorerlgd.github.io/3d-inkjet-printer-manual/
repo_name: 3d-inkjet-printer-manual
docs_dir: docs/zh
site_dir: site

theme:
  name: material
  custom_dir: overrides
  language: zh
  features:
    - navigation.top
    - toc.follow
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan

nav:
  - "\u6982\u8ff0": index.md
  - "\u5b89\u88c5\u548c\u914d\u7f6e":
      - "SD\u5361": installation/sd-card.md
      - "\u7535\u6e90\u8981\u6c42": installation/power-requirements.md
      - "Klipper 注意事项": installation/klipper-notes.md

extra:
  current_language: zh
  alternate:
    - name: "\u4e2d\u6587"
      lang: zh
    - name: English
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
